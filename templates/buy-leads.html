<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buy Leads &amp; Pay Per Call — Empire AI</title>
<style>
 body{background:#050810;color:#e6f1ff;font-family:system-ui,sans-serif;margin:0}
 .wrap{max-width:760px;margin:0 auto;padding:48px 20px}
 h1{color:#39ff88;font-size:2.4rem;margin:0 0 8px}
 .cy{color:#22e3ff}
 .sub{color:#9fb3c8;font-size:1.1rem;margin-bottom:28px}
 .card{background:#0b1220;border:1px solid #1c2a3a;border-radius:14px;padding:24px}
 label{display:block;margin:12px 0 4px;color:#9fb3c8;font-size:.9rem}
 input,select{width:100%;padding:11px;border-radius:8px;border:1px solid #1c2a3a;background:#050810;color:#e6f1ff;font-size:1rem}
 button{margin-top:20px;width:100%;padding:14px;border:0;border-radius:10px;background:#39ff88;color:#050810;font-weight:700;font-size:1.05rem;cursor:pointer}
 button:hover{background:#22e3ff}
 .note{margin-top:16px;color:#9fb3c8;font-size:.85rem}
 .wallet{margin-top:18px;padding:14px;background:#050810;border-radius:8px;border:1px solid #1c2a3a;font-family:monospace;color:#22e3ff;word-break:break-all}
 .ok{color:#39ff88}.err{color:#ff6b6b}
</style>
</head>
<body>
<div class="wrap">
 <h1>Buy Exclusive Leads.<br><span class="cy">Pay Only For What Converts.</span></h1>
 <div class="sub">Roofing, debt, medicare, mortgage, legal, auto, medical claims — delivered to your inbox or webhook in real time. Priced per lead, billed in USDC on Solana.</div>
 <div class="card">
  <form id="f">
   <label>Business name</label><input name="name" required placeholder="Apex Roofing Co">
   <label>Niche</label><input name="niche" required placeholder="roof_repair">
   <label>Email</label><input name="email" type="email" required placeholder="buyer@company.com">
   <label>Tier</label>
   <select name="tier">
    <option value="silver">Silver — $12/lead</option>
    <option value="bronze">Bronze — $9/lead</option>
    <option value="gold">Gold — $18/lead</option>
    <option value="platinum">Platinum — $25/lead</option>
   </select>
   <label>Webhook (optional)</label><input name="webhook_url" placeholder="https://your-crm.com/hook">
   <button type="submit">Get Matched Leads</button>
  </form>
  <div id="msg" class="note"></div>
  <div id="wallet" class="wallet" style="display:none"></div>
 </div>
 <script>
 document.getElementById('f').onsubmit = async function(e){
  e.preventDefault();
  var d = Object.fromEntries(new FormData(e.target));
  var m = document.getElementById('msg');
  var w = document.getElementById('wallet');
  try {
   var r = await fetch('/v1/buyers/apply', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
   var j = await r.json();
   if (j.ok) {
    m.className = 'note ok';
    m.textContent = 'Seated as ' + j.tier + ' buyer. Fund the vault to start collection.';
    w.style.display = 'block';
    w.textContent = 'USDC (Solana) vault: ' + j.payment.vault_wallet;
   } else {
    m.className = 'note err';
    m.textContent = 'Error: ' + (j.detail || 'unknown');
   }
  } catch (err) {
   m.className = 'note err';
   m.textContent = 'Network error — try again.';
  }
 };
 </script>
</div>
</body>
</html>
