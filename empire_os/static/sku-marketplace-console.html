<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Empire OS — SKU Marketplace Console</title>
<style>
  :root{--bg:#0b0e14;--card:#151a23;--line:#232b38;--txt:#e6edf3;--mut:#8b97a7;
        --acc:#5ad1a0;--acc2:#7aa2ff;--warn:#f0b400;}
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--txt)}
  header{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px}
  header h1{font-size:17px;margin:0;font-weight:600}
  header .sub{color:var(--mut);font-size:12px}
  .wrap{padding:24px;max-width:1200px;margin:0 auto}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  input,select,button{background:var(--card);border:1px solid var(--line);color:var(--txt);
    padding:8px 11px;border-radius:8px;font-size:13px}
  button{cursor:pointer;background:var(--acc);color:#06281c;font-weight:600;border:none}
  button.sec{background:var(--card);color:var(--txt);border:1px solid var(--line)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
  .card h3{margin:0;font-size:15px}
  .card .sku{color:var(--mut);font-size:11px;font-family:monospace}
  .tiers{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .tier{background:#0f141d;border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px}
  .tier b{color:var(--acc2)}
  .setup{color:var(--mut);font-size:12px}
  .card .acts{margin-top:auto;display:flex;gap:6px}
  .chk{accent-color:var(--acc)}
  .cmp{margin-top:22px;border-top:1px solid var(--line);padding-top:18px}
  table{border-collapse:collapse;width:100%;font-size:13px}
  th,td{border:1px solid var(--line);padding:8px 10px;text-align:left}
  th{background:var(--card);color:var(--mut);font-weight:600}
  .pay{margin-top:20px;background:#0f141d;border:1px solid var(--acc);border-radius:12px;padding:18px;display:none}
  .pay.show{display:block}
  .pay code{display:block;background:#06090f;padding:12px;border-radius:8px;word-break:break-all;color:var(--acc);margin:10px 0;font-size:12px}
  .pay a{color:var(--acc2)}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--line);
    padding:12px 16px;border-radius:10px;display:none;max-width:360px}
  .toast.show{display:block}
  .muted{color:var(--mut)}
</style>
</head>
<body>
<header>
  <h1>Empire OS</h1><span class="sub">SKU Marketplace Console — self-serve subscribe + in-app pay</span>
</header>
<div class="wrap">
  <div class="toolbar">
    <input id="name" placeholder="Your name" style="min-width:160px"/>
    <input id="email" placeholder="you@company.com" style="min-width:200px"/>
    <button class="sec" onclick="signup()">1 · Create account</button>
    <button onclick="loadPricing()">2 · Load SKUs</button>
    <button class="sec" onclick="buildCompare()">Compare selected</button>
    <span id="tenant" class="muted"></span>
  </div>

  <div id="grid" class="grid"></div>

  <div id="cmp" class="cmp"></div>

  <div id="pay" class="pay">
    <h3>Complete payment — Solana Pay</h3>
    <div id="paymeta" class="muted"></div>
    <code id="payurl"></code>
    <a id="paylink" href="#" target="_blank" rel="noopener">Open in wallet ↗</a>
    <div class="muted" style="margin-top:8px">After paying on-chain, the subscription activates automatically. No email required.</div>
  </div>
</div>
<div id="toast" class="toast"></div>

<script>
const API = "";  // same-origin
let TENANT = null;
let SKUS = {};

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);}
async function jpost(path,body){const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return r.json();}
async function jget(path){const r=await fetch(API+path);return r.json();}

async function signup(){
  const name=document.getElementById('name').value.trim();
  const email=document.getElementById('email').value.trim();
  if(!name||!email){toast('Enter name + email first');return;}
  try{
    const res=await jpost('/v1/tenants/signup',{name,email,plan:'free'});
    if(res.tenant_id){TENANT=res.tenant_id;document.getElementById('tenant').textContent='tenant: '+TENANT;}
    else {toast('signup: '+(res.detail||JSON.stringify(res)).slice(0,120));}
  }catch(e){toast('signup error: '+e.message);}
}

async function loadPricing(){
  const data=await jget('/v1/products/pricing');
  const pricing=data.pricing||{};
  SKUS=pricing;
  const grid=document.getElementById('grid');grid.innerHTML='';
  for(const [sku,info] of Object.entries(pricing)){
    const t=info.tiers||{};
    const card=document.createElement('div');card.className='card';
    card.innerHTML=`
      <div class="sku">${sku}</div>
      <h3>${info.name||sku}</h3>
      <div class="tiers">
        <span class="tier">T1 <b>$${(t.T1||0)}</b></span>
        <span class="tier">T2 <b>$${(t.T2||0)}</b></span>
        <span class="tier">T3 <b>$${(t.T3||0)}</b></span>
        <span class="tier">T4 <b>$${(t.T4_titanium||0)}</b></span>
      </div>
      <div class="setup">${info.whitelabel?'White-label setup: $'+(info.setup_fee_usdc||0):'No setup fee'}</div>
      <label class="muted" style="font-size:12px"><input type="checkbox" class="chk" value="${sku}"/> compare</label>
      <div class="acts">
        <button onclick="subscribe('${sku}',${(t.T1||0)})">Subscribe T1</button>
      </div>`;
    grid.appendChild(card);
  }
  toast('Loaded '+Object.keys(pricing).length+' SKUs');
}

async function subscribe(sku,amount){
  if(!TENANT){toast('Create account first (step 1)');return;}
  const amount_cents=Math.round(amount*100);
  const res=await jpost('/v1/ppc/charge',{
    buyer_id:TENANT, head:2, reason:'Console subscribe: '+sku,
    amount_cents, currency:'USD'
  });
  const pay=document.getElementById('pay');
  if(res.pay_url){
    document.getElementById('payurl').textContent=res.pay_url;
    document.getElementById('paylink').href=res.pay_url;
    document.getElementById('paymeta').textContent=
      `charge ${(res.amount_cents||amount_cents)/100} USDC · status ${res.status} · ${sku}`;
    pay.classList.add('show');
    pay.scrollIntoView({behavior:'smooth'});
    toast('Pay link ready — complete in wallet');
  }else{
    toast('No pay_url returned: '+(res.error||res.status||'unknown'));
  }
}

async function buildCompare(){
  const sel=[...document.querySelectorAll('.chk:checked')].map(c=>c.value);
  if(sel.length<2){toast('Select 2+ SKUs to compare');return;}
  let html='<h3>Compare ('+sel.length+')</h3><table><tr><th>SKU</th>';
  for(const s of sel) html+='<th>'+s+'</th>';
  html+='</tr>';
  const rows=['T1','T2','T3','T4_titanium','setup'];
  const labels={T1:'Tier 1 USDC',T2:'Tier 2 USDC',T3:'Tier 3 USDC',T4_titanium:'T4 Titanium',setup:'Setup fee'};
  for(const r of rows){
    html+='<tr><td>'+labels[r]+'</td>';
    for(const s of sel){
      const v=(SKUS[s]&&SKUS[s].tiers&&SKUS[s].tiers[r])||(r==='setup'?(SKUS[s]||{}).setup_fee_usdc||0):0;
      html+='<td>'+(r==='setup'?'$':'$')+v+'</td>';
    }
    html+='</tr>';
  }
  html+='</table>';
  document.getElementById('cmp').innerHTML=html;
}

loadPricing();
</script>
</body>
</html>
